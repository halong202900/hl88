<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mines Slot - HL88 ©HALONG</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: sans-serif;
        }

        /* Màn hình chờ 5 giây */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ffffff; /* Nền trắng cho sạch sẽ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #loading-screen img {
            width: 150px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .loading-text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Container game */
        #game-wrapper {
            width: 100vw;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-screen">
        <img src="load.png" alt="Loading...">
        <div class="loading-text">ĐANG KHỞI TẠO GAME...</div>
    </div>

    <div id="game-wrapper">
        <iframe 
            src="https://slotslaunch.com/game/41305" 
            allow="autoplay; fullscreen">
        </iframe>
        <div class="watermark">©halong</div>
    </div>

    <script>
        window.onload = function() {
            // Đợi đúng 5 giây (5000ms) rồi mới ẩn màn hình load
            setTimeout(function() {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(function() {
                    loader.style.display = 'none';
                }, 800); // Đợi hiệu ứng mờ dần xong mới xóa hẳn
            }, 5000);
        };
    </script>

</body>
</html>
