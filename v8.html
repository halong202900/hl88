<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game V8 Fullscreen ©HALONG</title>
    <style>
        /* Reset toàn bộ về 100% để không bao giờ có thanh cuộn */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Cấm tuyệt đối việc vuốt lên xuống */
            background-color: #000;
        }

        #game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%; /* Luôn luôn bằng đúng chiều cao màn hình điện thoại */
            border: none;
            flex-grow: 1;
        }

        .watermark {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-family: sans-serif;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 9999;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

<div id="game-wrapper" onclick="openFullscreen();">
    <iframe src="https://v8.kocms397.com/?l=vi&currency=VND" allow="autoplay; fullscreen"></iframe>
    <div class="watermark">©halong</div>
</div>

<script>
    function openFullscreen() {
        var elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }
    }
</script>

</body>
</html>
