<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game V8 Fullscreen ©HALONG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Cho phép cuộn trang nếu game dài hơn màn hình */
            overflow-y: auto; 
            background-color: #000;
            -webkit-overflow-scrolling: touch; /* Giúp cuộn mượt hơn trên iPhone */
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            /* Bỏ height: 100vh để wrapper tự giãn theo game */
            min-height: 100%; 
        }

        iframe {
            width: 100%;
            /* Thay vì cố định 100%, mình để 2000px hoặc tự giãn để giữ đúng tỉ lệ game */
            height: 2500px; 
            border: none;
            display: block;
            z-index: 1;
        }

        .watermark {
            position: fixed; 
            bottom: 10px;
            right: 15px;
            color: rgba(255, 255, 255, 0.5); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none; 
            z-index: 999999; 
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); 
            letter-spacing: 1px;
            white-space: nowrap; 
        }
    </style>
</head>
<body>

<div id="game-wrapper" onclick="openFullscreen();">
    <iframe 
        id="game-iframe"
        src="https://v8.kocms397.com/?l=vi&currency=VND" 
        allow="autoplay; fullscreen; orientation">
    </iframe>

    <div class="watermark">©halong</div>
</div>

<script>
    function openFullscreen() {
        var elem = document.documentElement; // Chế độ toàn màn hình cho cả trang để cuộn được
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
    }
</script>

</body>
</html>
