<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game V8 Fullscreen ©HALONG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* Lớp thấp hơn logo */
        }

        /* Logo chìm ©halong - Cải tiến để luôn nổi lên trên */
        .watermark {
            position: fixed; /* Dùng fixed để nó không bị trôi khi iframe scroll */
            bottom: 10px;
            right: 15px;
            color: rgba(255, 255, 255, 0.5); /* Tăng độ đậm một chút để dễ thấy trên nền game */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none; /* Không cho phép chạm vào logo để tránh cản trở chơi game */
            z-index: 999999; /* Số cực lớn để đảm bảo nằm trên cùng */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); /* Đổ bóng để nổi bật trên mọi màu nền của game */
            letter-spacing: 1px;
            white-space: nowrap; /* Giữ logo nằm trên 1 hàng ngang */
        }
    </style>
</head>
<body>

<div id="game-wrapper" onclick="openFullscreen();">
    <iframe 
        id="game-iframe"
        src="https://v8.kocms397.com/?l=vi&currency=VND" 
        allow="autoplay; fullscreen; orientation">
    </iframe>

    <div class="watermark">©halong</div>
</div>

<script>
    function openFullscreen() {
        var elem = document.getElementById("game-wrapper");
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
            elem.msRequestFullscreen();
        }
    }
</script>

</body>
</html>
