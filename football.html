<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballX Vertical Mode</title>
    <style>
        /* Reset cơ bản */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Khung chứa Game dạng DỌC */
        .game-container {
            position: relative;
            /* Tỉ lệ 9:16 cho màn hình dọc điện thoại */
            width: 100vw; 
            height: 100vh;
            max-width: 500px; /* Giới hạn chiều rộng nếu xem trên máy tính */
            max-height: 90vh;
            background: #1a1a1a;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Iframe tự động lấp đầy khung dọc */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Dấu chìm ©halong */
        .watermark {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%); /* Căn giữa dấu chìm ở phía dưới */
            pointer-events: none; 
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <iframe 
            src="https://eu-server.ssgportal.com/GameLauncher/Loader.aspx?GameCategory=Games&GameName=FootballX&Token=DEMO&PortalName=DEMO&ReturnUrl=https://www.smartsoftgaming.com&Lang=vi&Currency=VND" 
            allowfullscreen>
        </iframe>

        <div class="watermark">©halong</div>
    </div>

</body>
</html>
