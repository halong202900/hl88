<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Avia Fly 2 - HL88</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            height: auto; 
            min-height: 100%;
            background-color: #000; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        /* Màn hình chờ load.png */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ffffff; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #loading-screen img {
            width: 150px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .loading-text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: sans-serif;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .game-wrapper { position: relative; width: 100%; display: flex; flex-direction: column; }
        
        /* Giữ nguyên height 850px để thấy rõ bảng lịch sử */
        iframe { width: 100%; height: 850px; border: none; display: block; }

        .copyright-tag {
            position: fixed; 
            bottom: 20px; right: 15px;  
            color: rgba(255, 255, 255, 0.4); 
            font-size: 11px;
            font-family: sans-serif;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none; 
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-screen">
        <img src="load.png" alt="Loading...">
        <div class="loading-text">ĐANG KHỞI TẠO GAME...</div>
    </div>

    <div class="game-wrapper">
        <div class="copyright-tag">©halong</div>
        <iframe 
            src="https://slotslaunch.com/game/42027?language=vi&currency=VND" 
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(function() {
                    loader.style.display = 'none';
                }, 800);
            }, 5000);
        };
    </script>

</body>
</html>
