<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Avia Fly 2 - HL88</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            height: auto; 
            min-height: 100%;
            background-color: #000; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        .game-wrapper { position: relative; width: 100%; display: flex; flex-direction: column; }
        
        /* Chỉnh height 850px để thấy rõ bảng lịch sử nổ hũ phía trên */
        iframe { width: 100%; height: 850px; border: none; display: block; }

        .copyright-tag {
            position: fixed; 
            bottom: 20px; right: 15px;  
            color: rgba(255, 255, 255, 0.4); 
            font-size: 11px;
            font-family: sans-serif;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none; 
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="copyright-tag">©halong</div>
        <iframe 
            src="https://slotslaunch.com/game/42018?language=vi&currency=VND" 
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
