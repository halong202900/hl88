<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Avia Masters - HL88</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        .game-wrapper { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }

        /* Dòng bản quyền đẩy lên cao hơn một chút */
        .copyright-tag {
            position: absolute;
            bottom: 80px; /* Đẩy lên cao 80px để không bị thanh công cụ che */
            right: 15px;  
            color: rgba(255, 255, 255, 0.4); /* Tăng độ rõ lên 40% */
            font-size: 11px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600; /* Làm chữ đậm hơn một chút */
            letter-spacing: 0.5px;
            z-index: 100;
            pointer-events: none; 
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); /* Đổ bóng đậm hơn để nổi trên mặt biển */
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="copyright-tag">©halong</div>
        
        <iframe 
            src="https://slotslaunch.com/game/29406?language=vi&currency=VND" 
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
